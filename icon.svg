<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 背景 -->
  <rect width="512" height="512" rx="112" fill="#1a1a1a"/>
  <!-- 時計の外枠 -->
  <circle cx="248" cy="230" r="155" fill="none" stroke="#f5f5f5" stroke-width="20"/>
  <!-- 時計の目盛り -->
  <line x1="248" y1="89" x2="248" y2="116" stroke="#f5f5f5" stroke-width="12" stroke-linecap="round"/>
  <line x1="387" y1="230" x2="360" y2="230" stroke="#f5f5f5" stroke-width="12" stroke-linecap="round"/>
  <line x1="248" y1="371" x2="248" y2="344" stroke="#f5f5f5" stroke-width="12" stroke-linecap="round"/>
  <line x1="109" y1="230" x2="136" y2="230" stroke="#f5f5f5" stroke-width="12" stroke-linecap="round"/>
  <!-- 時針（10時方向） -->
  <line x1="248" y1="230" x2="185" y2="160" stroke="#f5f5f5" stroke-width="18" stroke-linecap="round"/>
  <!-- 分針（2時方向） -->
  <line x1="248" y1="230" x2="312" y2="145" stroke="#f5f5f5" stroke-width="13" stroke-linecap="round"/>
  <!-- 中心 -->
  <circle cx="248" cy="230" r="13" fill="#f5f5f5"/>
  <!-- コイン（右下） -->
  <circle cx="368" cy="374" r="72" fill="#16a34a"/>
  <circle cx="368" cy="374" r="60" fill="none" stroke="#f5f5f5" stroke-width="5" opacity="0.4"/>
  <text x="368" y="398" font-family="Arial,Helvetica,sans-serif" font-size="68" font-weight="700" fill="white" text-anchor="middle">¥</text>
</svg>
